name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, pdo, pdo_mysql, json, tokenizer

    - name: Validate composer.json
      run: composer validate --strict

    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Create release
      uses: softprops/action-gh-release@v1
      with:
        name: Coyote Framework ${{ steps.get_version.outputs.VERSION }}
        draft: false
        prerelease: ${{ contains(steps.get_version.outputs.VERSION, '-') }}
        generate_release_notes: true
        files: |
          README.md
          LICENSE
          composer.json

    - name: Build package
      run: |
        composer install --prefer-dist --no-progress --no-dev
        composer archive --format=zip --file=coyote-framework-${{ steps.get_version.outputs.VERSION }}

    - name: Upload package to release
      uses: softprops/action-gh-release@v1
      with:
        files: coyote-framework-${{ steps.get_version.outputs.VERSION }}.zip

  publish-packagist:
    runs-on: ubuntu-latest
    needs: release
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress --no-dev

    - name: Update Packagist (via webhook)
      run: |
        curl -X POST https://packagist.org/api/update-package?username=${{ secrets.PACKAGIST_USERNAME }}&apiToken=${{ secrets.PACKAGIST_TOKEN }} \
          -d '{"repository":{"url":"https://github.com/coyoteframework/framework"}}' \
          -H "Content-Type: application/json"
      if: env.PACKAGIST_USERNAME != '' && env.PACKAGIST_TOKEN != ''

  notify:
    runs-on: ubuntu-latest
    needs: release
    
    steps:
    - name: Send Discord notification
      uses: appleboy/discord-action@master
      with:
        webhook_id: ${{ secrets.DISCORD_WEBHOOK_ID }}
        webhook_token: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
        username: 'Coyote Framework CI'
        message: |
          🚀 **Nova versão lançada!** 
          **Versão:** ${{ github.ref_name }}
          **Commit:** ${{ github.sha }}
          **Autor:** ${{ github.actor }}
          **Link:** https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
      if: env.DISCORD_WEBHOOK_ID != '' && env.DISCORD_WEBHOOK_TOKEN != ''